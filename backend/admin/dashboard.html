<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — Braise Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="mark">BRAISE</div>
      <div class="sub">Admin</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Menu</div>
      <a href="dashboard.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="commandes.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>
        Commandes
      </a>
      <a href="devis.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Devis
      </a>
      <a href="produits.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 7H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1Z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Produits
      </a>
      <a href="coffrets.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        Coffrets
      </a>
      <a href="clients.html" class="nav-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clients
      </a>
    </nav>
    <div class="sidebar-footer">
      <button onclick="logout()" style="color:var(--muted);font-size:12px;display:flex;gap:6px;align-items:center">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div class="topbar-actions">
        <span id="today-date" style="font-size:12px;color:var(--muted)"></span>
      </div>
    </div>

    <div class="content">
      <!-- KPIs -->
      <div class="cards-grid" id="kpis">
        <div class="card"><div class="card-label">Commandes aujourd'hui</div><div class="card-value" id="kpi-jour">—</div></div>
        <div class="card"><div class="card-label">Revenu du jour</div><div class="card-value or" id="kpi-revenu">—</div></div>
        <div class="card"><div class="card-label">En attente</div><div class="card-value" id="kpi-attente">—</div><div class="card-sub">à confirmer</div></div>
        <div class="card"><div class="card-label">En cours</div><div class="card-value" id="kpi-cours">—</div><div class="card-sub">confirmées + expédiées</div></div>
        <div class="card"><div class="card-label">Total commandes</div><div class="card-value" id="kpi-total">—</div></div>
      </div>

      <!-- Dernières commandes -->
      <div class="table-wrap">
        <div class="table-head">
          <h2>Dernières commandes</h2>
          <a href="commandes.html" class="btn btn-ghost btn-sm">Voir tout →</a>
        </div>
        <table>
          <thead>
            <tr>
              <th>Référence</th>
              <th>Client</th>
              <th>Montant</th>
              <th>Statut</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr class="empty-row"><td colspan="5">Chargement...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="admin.js"></script>
<script>
  requireAuth();
  setActiveNav();

  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  async function load() {
    const data = await apiFetch('/admin/stats');
    if (!data) return;

    document.getElementById('kpi-jour').textContent   = data.commandes_aujourd;
    document.getElementById('kpi-revenu').textContent = fmtMontant(data.revenu_jour);
    document.getElementById('kpi-attente').textContent= data.en_attente;
    document.getElementById('kpi-cours').textContent  = data.en_cours;
    document.getElementById('kpi-total').textContent  = data.total_commandes;

    const tbody = document.getElementById('tbody');
    if (!data.dernieres.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Aucune commande pour l\'instant</td></tr>';
      return;
    }
    tbody.innerHTML = data.dernieres.map(c => `
      <tr onclick="location.href='commandes.html'">
        <td><strong>${c.ref}</strong></td>
        <td>${c.client ? c.client.prenom + ' ' + c.client.nom : '—'}</td>
        <td>${fmtMontant(c.montant_total)}</td>
        <td>${statutBadge(c.statut)}</td>
        <td class="muted">${fmtDateTime(c.created_at)}</td>
      </tr>
    `).join('');
  }

  load();
</script>
</body>
</html>
