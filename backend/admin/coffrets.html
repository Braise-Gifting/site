<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coffrets — Braise Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand"><div class="mark">BRAISE</div><div class="sub">Admin</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Menu</div>
      <a href="dashboard.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a href="commandes.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>Commandes</a>
      <a href="devis.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Devis</a>
      <a href="produits.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 7H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1Z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>Produits</a>
      <a href="coffrets.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>Coffrets</a>
      <a href="clients.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clients</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" style="color:var(--muted);font-size:12px;display:flex;gap:6px;align-items:center"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Déconnexion</button></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>Coffrets</h1>
      <div class="topbar-actions">
        <span style="font-size:12px;color:var(--muted)">Cliquer sur un prix pour éditer</span>
      </div>
    </div>

    <div class="content">
      <div class="table-wrap">
        <div class="table-head">
          <h2 id="table-title">Coffrets cadeaux</h2>
        </div>
        <table>
          <thead>
            <tr>
              <th>Coffret</th>
              <th>Occasion</th>
              <th>Composition</th>
              <th style="text-align:right">Prix min</th>
              <th style="text-align:right">Prix max</th>
              <th>Badge</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr class="empty-row"><td colspan="7">Chargement...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Drawer détail coffret -->
  <div class="modal-overlay" id="drawer-overlay" onclick="if(event.target===this)closeDrawer()">
    <div class="drawer" id="drawer">
      <div class="drawer-head">
        <h3 id="drawer-title">—</h3>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>
      <div id="drawer-body"></div>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
  requireAuth();
  setActiveNav();

  let coffrets = [];

  async function load() {
    const data = await apiFetch('/coffrets');
    if (!data) return;
    coffrets = data;
    document.getElementById('table-title').textContent = `${data.length} coffret${data.length > 1 ? 's' : ''}`;
    render(coffrets);
  }

  function render(rows) {
    const tbody = document.getElementById('tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Aucun coffret</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(c => {
      const items = (c.items || []).map(i =>
        `<span style="font-size:11px;color:var(--muted)">${i.quantite > 1 ? i.quantite + '× ' : ''}${i.gestuelle?.nom || '?'}</span>`
      ).join('<br>');

      return `
        <tr onclick="openDrawer('${c.id}')">
          <td>
            <div style="font-weight:500">${c.nom}</div>
            ${c.tagline ? `<div class="muted" style="font-size:12px">${c.tagline}</div>` : ''}
          </td>
          <td class="muted">${c.occasion || '—'}</td>
          <td style="line-height:1.8">${items || '<span class="muted">—</span>'}</td>
          <td style="text-align:right">
            <input class="editable" type="number" value="${c.prix_min || ''}" min="1"
              onclick="event.stopPropagation()"
              onblur="savePrix('${c.id}', 'prix_min', this)"
              onkeydown="if(event.key==='Enter')this.blur()">
          </td>
          <td style="text-align:right">
            <input class="editable" type="number" value="${c.prix_max || ''}" min="1"
              onclick="event.stopPropagation()"
              onblur="savePrix('${c.id}', 'prix_max', this)"
              onkeydown="if(event.key==='Enter')this.blur()">
          </td>
          <td onclick="event.stopPropagation()">
            <input class="editable" type="text" value="${c.badge || ''}"
              placeholder="—"
              style="width:90px;font-size:12px"
              onblur="saveBadge('${c.id}', this)"
              onkeydown="if(event.key==='Enter')this.blur()">
          </td>
          <td onclick="event.stopPropagation()">
            <button class="badge ${c.actif ? 'badge-livree' : 'badge-annulee'}"
              onclick="toggleActif('${c.id}')"
              title="Cliquer pour basculer">
              ${c.actif ? 'Actif' : 'Inactif'}
            </button>
          </td>
        </tr>
      `;
    }).join('');
  }

  async function savePrix(id, champ, input) {
    const val = parseInt(input.value);
    const original = coffrets.find(c => c.id === id)?.[champ];
    if (!val || val < 1) { input.value = original || ''; return; }
    const res = await apiFetch(`/coffrets/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ [champ]: val })
    });
    if (res && !res.error) {
      const c = coffrets.find(c => c.id === id);
      if (c) c[champ] = val;
      input.style.color = 'var(--green)';
      setTimeout(() => input.style.color = '', 1000);
    } else {
      input.value = original || '';
    }
  }

  async function saveBadge(id, input) {
    const badge = input.value.trim() || null;
    const res = await apiFetch(`/coffrets/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ badge })
    });
    if (res && !res.error) {
      const c = coffrets.find(c => c.id === id);
      if (c) c.badge = badge;
      input.style.color = 'var(--green)';
      setTimeout(() => input.style.color = '', 1000);
    }
  }

  async function toggleActif(id) {
    const c = coffrets.find(c => c.id === id);
    if (!c) return;
    const res = await apiFetch(`/coffrets/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ actif: !c.actif })
    });
    if (res && !res.error) {
      c.actif = !c.actif;
      render(coffrets);
    }
  }

  function openDrawer(id) {
    const c = coffrets.find(c => c.id === id);
    if (!c) return;
    document.getElementById('drawer-title').textContent = c.nom;
    document.getElementById('drawer-body').innerHTML = `
      <div class="drawer-section">
        <h4>Informations</h4>
        <div class="info-row"><span class="label">Slug</span><span class="val">${c.slug}</span></div>
        <div class="info-row"><span class="label">Tagline</span><span class="val">${c.tagline || '—'}</span></div>
        <div class="info-row"><span class="label">Occasion</span><span class="val">${c.occasion || '—'}</span></div>
        <div class="info-row"><span class="label">Prix min</span><span class="val">${c.prix_min ? c.prix_min + ' MAD' : '—'}</span></div>
        <div class="info-row"><span class="label">Prix max</span><span class="val">${c.prix_max ? c.prix_max + ' MAD' : '—'}</span></div>
        <div class="info-row"><span class="label">Badge</span><span class="val">${c.badge || '—'}</span></div>
        <div class="info-row"><span class="label">Statut</span><span class="val"><span class="badge ${c.actif ? 'badge-livree' : 'badge-annulee'}">${c.actif ? 'Actif' : 'Inactif'}</span></span></div>
      </div>
      ${c.description ? `
      <div class="drawer-section">
        <h4>Description</h4>
        <p style="font-size:13px;color:var(--muted);line-height:1.7">${c.description}</p>
      </div>` : ''}
      <div class="drawer-section">
        <h4>Composition (${(c.items || []).length} éléments)</h4>
        ${(c.items || []).map(i => `
          <div class="info-row">
            <span class="label">${i.gestuelle?.nom || '?'}</span>
            <span class="val">${i.quantite} pièce${i.quantite > 1 ? 's' : ''}</span>
          </div>
        `).join('') || '<p style="color:var(--muted);font-size:13px">Aucun élément</p>'}
      </div>
    `;
    document.getElementById('drawer-overlay').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('drawer-overlay').classList.remove('open');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  load();
</script>
</body>
</html>
